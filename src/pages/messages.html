<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/messages.css" />
</head>
<body>
  <header class="lhai-topbar"><div class="lhai-brand">Landing Help AI</div><div class="lhai-topbar__right"><button type="button" class="lhai-button lhai-button--secondary lhai-button--compact" data-lhai-logout>로그아웃</button><span class="lhai-badge lhai-badge--customer">Customer</span></div></header>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial customer-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header">
        <div>
          <h1 class="lhai-title">Message Inbox</h1>
          <p class="lhai-subtitle">Auditable communication center for system, admin, AI, payment, and document updates.</p>
        </div>
      </section>
      <section class="lhai-card lhai-message-filters">
        <label class="lhai-field">
          <span class="lhai-label">Category</span>
          <select id="messageCategoryFilter">
            <option value="">All</option>
            <option value="SYSTEM">SYSTEM</option>
            <option value="ADMIN">ADMIN</option>
            <option value="AI">AI</option>
            <option value="PAYMENT">PAYMENT</option>
            <option value="DOCUMENT">DOCUMENT</option>
          </select>
        </label>
        <label class="lhai-checkbox">
          <input id="messageUnreadOnly" type="checkbox" />
          <span>Unread only</span>
        </label>
      </section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card">
          <h2 class="lhai-card__title">Messages</h2>
          <div id="messageListContainer" class="lhai-message-list"></div>
        </article>
        <article class="lhai-card">
          <h2 class="lhai-card__title">Message Detail</h2>
          <div id="messageDetailContainer" class="lhai-message-detail lhai-state lhai-state--empty">Select a message from the list.</div>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/pages/messages.js"></script>
</body>
</html>
