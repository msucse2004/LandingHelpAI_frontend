<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>메시지함 - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/messages.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial customer-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header">
        <div>
          <h1 class="lhai-title">메시지함</h1>
          <p class="lhai-subtitle">고객센터 대화에서 알림·운영 답변과 Landing Help AI Agent 안내를 한곳에서 이용할 수 있습니다.</p>
        </div>
      </section>
      <section class="lhai-card lhai-message-filters">
        <label class="lhai-field">
          <span class="lhai-label">구분</span>
          <select id="messageCategoryFilter">
            <option value="">전체</option>
            <option value="SYSTEM">SYSTEM</option>
            <option value="ADMIN">ADMIN</option>
            <option value="AI">AI</option>
            <option value="PAYMENT">PAYMENT</option>
            <option value="DOCUMENT">DOCUMENT</option>
            <option value="CHAT">CHAT</option>
          </select>
        </label>
        <label class="lhai-checkbox">
          <input id="messageUnreadOnly" type="checkbox" />
          <span>읽지 않음만</span>
        </label>
      </section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card">
          <h2 class="lhai-card__title">대화 목록</h2>
          <div id="messageListContainer" class="lhai-message-list"></div>
        </article>
        <article class="lhai-card">
          <h2 class="lhai-card__title">대화</h2>
          <div id="messageDetailContainer" class="lhai-message-detail lhai-state lhai-state--empty">왼쪽에서 대화를 선택하세요.</div>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/messages.js"></script>
</body>
</html>
