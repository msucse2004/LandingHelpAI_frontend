<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원 상세 - Landing Help AI Admin</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar" data-i18n-aria-label="common.sidebar.admin.aria_label" aria-label="Admin navigation"></aside>
    <main class="lhai-main" id="main">
      <section class="lhai-page-header u-flex-between u-gap-4">
        <div>
          <h1 class="lhai-title">회원 상세</h1>
          <p class="lhai-subtitle">계정 ID로 조회한 등록 정보입니다. 티어 1~3 관리자는 자신보다 낮은 티어 계정에 한해 가입·이메일 인증 상태를 수정할 수 있으며, 계정 삭제도 같은 규칙이 적용됩니다.</p>
        </div>
        <a class="lhai-button lhai-button--secondary" href="admin-users.html">목록으로</a>
      </section>
      <p class="lhai-help" id="detailAlert" role="status" aria-live="polite"></p>
      <section class="lhai-card" id="detailCard" hidden>
        <h2 class="lhai-card__title">프로필</h2>
        <dl class="lhai-detail-dl" id="detailDl"></dl>
      </section>
      <section class="lhai-card u-mt-4" id="registrationEditCard" hidden aria-labelledby="regEditTitle">
        <h2 class="lhai-card__title" id="regEditTitle">가입·인증 상태 수정</h2>
        <p class="lhai-help u-mb-3">대상 계정의 티어가 본인보다 낮을 때만 표시됩니다.</p>
        <form id="registrationEditForm" class="lhai-stack u-gap-3">
          <label class="lhai-field">
            <span class="lhai-label">이메일 인증</span>
            <select class="lhai-select" id="regEditEmailVerified" name="email_verified" aria-describedby="regEditHint">
              <option value="true">완료</option>
              <option value="false">미완료</option>
            </select>
          </label>
          <label class="lhai-field">
            <span class="lhai-label">회원 상태</span>
            <select class="lhai-select" id="regEditMembership" name="membership_status">
              <option value="pending_verification">인증 대기</option>
              <option value="active">정식 회원</option>
            </select>
          </label>
          <p class="lhai-help" id="regEditHint">저장 시 서버에 반영됩니다.</p>
          <div class="u-flex u-gap-2 u-flex-wrap">
            <button type="submit" class="lhai-button lhai-button--primary" id="regEditSubmitBtn">저장</button>
          </div>
        </form>
        <p class="lhai-help u-mt-2" id="regEditAlert" role="status" aria-live="polite" hidden></p>
      </section>
      <section class="lhai-card u-mt-4" id="messageSessionsCard" hidden>
        <h2 class="lhai-card__title">메시지 세션</h2>
        <p class="lhai-help u-mb-2">해당 회원의 메시지함에서 대화 내용을 확인합니다. 스레드가 있으면 바로 열 수 있습니다.</p>
        <div id="messageSessionsList"></div>
      </section>
      <section class="lhai-card u-mt-4" id="dangerZone" hidden aria-labelledby="dangerTitle">
        <h2 class="lhai-card__title" id="dangerTitle">계정 삭제</h2>
        <p class="lhai-help u-mb-3">삭제하면 되돌릴 수 없습니다. 데모 시드 계정은 삭제할 수 없습니다.</p>
        <button type="button" class="lhai-button lhai-button--danger" id="detailDeleteBtn">이 계정 삭제</button>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-static-shell.js"></script>
  <script type="module" src="../assets/js/pages/admin-user-detail.js"></script>
</body>
</html>
