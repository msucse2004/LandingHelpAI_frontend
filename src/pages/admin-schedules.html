<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Schedules - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-schedules.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header"><div><h1 class="lhai-title">Schedule Management</h1><p class="lhai-subtitle">Create draft, revise proposed schedules, and mark confirmed with audit-first data trail.</p></div></section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card">
          <h2 class="lhai-card__title">Schedules</h2>
          <div id="adminScheduleList"></div>
        </article>
        <article class="lhai-card">
          <h2 class="lhai-card__title">Draft / Revision Form</h2>
          <form id="adminScheduleForm">
            <label class="lhai-field"><span class="lhai-label">Customer Profile ID</span><input id="scheduleCustomerId" value="profile::demo@customer.com" /></label>
            <label class="lhai-field"><span class="lhai-label">Proposed Slots (comma separated ISO)</span><textarea id="scheduleSlots" rows="3" placeholder="2026-04-30T09:00:00Z, 2026-05-01T09:00:00Z"></textarea></label>
            <label class="lhai-field"><span class="lhai-label">Recommendation Reasons (comma separated)</span><textarea id="scheduleReasons" rows="2" placeholder="avoid peak load, aligns with docs"></textarea></label>
            <label class="lhai-field"><span class="lhai-label">Revision Note</span><input id="scheduleRevisionNote" placeholder="Reason for revision" /></label>
            <div class="lhai-admin-schedule-actions">
              <button class="lhai-button lhai-button--primary" type="submit">Create Draft</button>
              <button class="lhai-button lhai-button--secondary" id="reviseScheduleBtn" type="button">Revise Selected</button>
              <button class="lhai-button lhai-button--secondary" id="proposeScheduleBtn" type="button">Propose Selected</button>
              <button class="lhai-button lhai-button--primary" id="confirmScheduleBtn" type="button">Mark Confirmed</button>
            </div>
          </form>
          <p id="adminScheduleStatus" class="u-text-muted u-mt-2"></p>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-schedules.js"></script>
</body>
</html>
