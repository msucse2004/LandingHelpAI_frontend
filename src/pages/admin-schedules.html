<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>일정 관리 - Landing Help AI</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-schedules.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main lhai-main--admin-schedules">
      <section class="lhai-page-header"><div><h1 class="lhai-title">일정 관리</h1><p class="lhai-subtitle">결제가 완료된 고객을 아래에서 고른 뒤, 일정을 열어 달력에서 서비스 카드를 드래그해 수정·저장하고 필요 시 고객에게 공개하세요.</p></div></section>

      <section class="lhai-card lhai-admin-schedule-section">
        <div class="lhai-admin-schedule-section__head">
          <h2 class="lhai-card__title">결제 완료 고객</h2>
          <button type="button" class="lhai-button lhai-button--secondary" id="paidCustomersReloadBtn">목록 새로고침</button>
        </div>
        <p class="u-text-muted lhai-admin-schedule-intro">청구서 상태가 <strong>PAID</strong>인 고객만 표시됩니다. 행을 클릭하면 해당 고객의 일정 목록이 아래에 나옵니다.</p>
        <div id="paidCustomersList" class="lhai-admin-paid-customers" role="listbox" aria-label="결제 완료 고객"></div>
      </section>

      <section class="lhai-card lhai-admin-schedule-section">
        <h2 class="lhai-card__title">선택한 고객의 일정</h2>
        <p id="selectedCustomerLabel" class="lhai-admin-schedule-selected-label u-text-muted">고객을 위에서 선택해 주세요.</p>
        <div id="adminScheduleList" class="lhai-admin-schedule-list"></div>
        <p id="adminScheduleStatus" class="u-text-muted u-mt-2" role="status"></p>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-schedules.js"></script>
</body>
</html>
