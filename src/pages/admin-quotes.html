<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>견적 관리 - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-quotes.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header"><div><h1 class="lhai-title">견적</h1><p class="lhai-subtitle">견적 대기·승인·제안 흐름을 관리합니다.</p></div></section>

      <section class="lhai-card lhai-admin-quote-prep-banner u-mb-4" id="adminQuotePrepBanner" hidden></section>

      <section class="lhai-grid">
        <article class="lhai-card lhai-quote-list">
          <div class="lhai-admin-quotes__toolbar">
            <h2 class="lhai-card__title lhai-admin-quotes__title">견적 목록</h2>
            <div class="lhai-admin-quotes__filter">
              <label class="lhai-label lhai-admin-quotes__filter-label" for="adminQuoteStatusFilter">상태로 조회</label>
              <select class="lhai-select lhai-admin-quotes__select" id="adminQuoteStatusFilter" aria-describedby="adminQuoteStatusFilterHelp">
                <option value="">전체</option>
                <option value="DRAFT">초안 (DRAFT)</option>
                <option value="PROPOSED">제안됨 (PROPOSED)</option>
                <option value="APPROVED">승인됨 (APPROVED)</option>
                <option value="REJECTED">거절 (REJECTED)</option>
                <option value="EXPIRED">만료 (EXPIRED)</option>
              </select>
            </div>
          </div>
          <p class="lhai-help u-mb-2" id="adminQuoteStatusFilterHelp">상태를 바꾸면 해당 견적만 불러옵니다. 필터는 주소의 <code>?status=</code>와 맞춰 저장되므로 링크로 공유할 수 있습니다.</p>
          <div id="adminQuoteList"></div>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-quotes.js"></script>
</body>
</html>
