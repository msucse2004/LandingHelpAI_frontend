<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="common.survey_recommendations.page_title">추천 결과 — Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/survey-recommendations.css" />
</head>
<body>
  <main class="lhai-container lhai-container--survey">
    <section class="lhai-page-header">
      <div>
        <h1 class="lhai-title" data-i18n="common.survey_recommendations.heading">맞춤 추천 결과</h1>
        <p class="lhai-subtitle" data-i18n="common.survey_recommendations.subtitle">
          답변을 바탕으로 패키지/모듈(포함)과 애드온(선택)을 정리했어요. 이 화면에서는 금액을 보여주지 않으며, 견적서에서 비용을 확인할 수 있어요.
        </p>
      </div>
    </section>

    <section class="lhai-card lhai-container__card survey-recommendations__card">
      <div id="surveyRecStatus" class="lhai-help" role="status" aria-live="polite"></div>
      <div id="surveyRecPackages" class="survey-recommendations__packages" data-i18n-aria-label="common.survey_recommendations.aria_packages" aria-label="추천 패키지 목록"></div>

      <div class="survey-recommendations__divider" aria-hidden="true"></div>

        <div id="surveyRecSelectionSummary" class="survey-recommendations__summary" aria-live="polite">
        <div id="surveyRecPriceSummary" class="lhai-help" data-i18n="common.survey_recommendations.summary_default">
          선택한 항목 수만 표시합니다. 금액은 견적 단계에서 확인하세요.
        </div>
      </div>

      <form id="surveyRecQuoteForm" class="survey-recommendations__quote-form">
        <div class="survey-recommendations__block-title" data-i18n="common.survey_recommendations.form_section_title">견적 요청 정보</div>
        <div class="survey-recommendations__quote-grid">
          <div class="survey-field">
            <label class="lhai-label" for="quoteProfileFullName" data-i18n="common.survey_recommendations.label_full_name">성함(필수)</label>
            <input class="lhai-input" id="quoteProfileFullName" type="text" required data-i18n-placeholder="common.survey_recommendations.ph_full_name" placeholder="예: 홍길동" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quoteProfileEmail" data-i18n="common.survey_recommendations.label_email">이메일(필수)</label>
            <input class="lhai-input" id="quoteProfileEmail" type="email" required data-i18n-placeholder="common.survey_recommendations.ph_email" placeholder="예: name@example.com" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quoteCompanyName" data-i18n="common.survey_recommendations.label_company">회사명(선택)</label>
            <input class="lhai-input" id="quoteCompanyName" type="text" data-i18n-placeholder="common.survey_recommendations.ph_company" placeholder="예: Acme Corp" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quotePhone" data-i18n="common.survey_recommendations.label_phone">전화번호(선택)</label>
            <input class="lhai-input" id="quotePhone" type="tel" data-i18n-placeholder="common.survey_recommendations.ph_phone" placeholder="예: +1 555 1234" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quoteScheduleStart" data-i18n="common.survey_recommendations.label_start">희망 시작일(필수)</label>
            <input class="lhai-input" id="quoteScheduleStart" type="date" required />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quoteScheduleEnd" data-i18n="common.survey_recommendations.label_end">희망 종료일(선택)</label>
            <input class="lhai-input" id="quoteScheduleEnd" type="date" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quoteCountry" data-i18n="common.survey_recommendations.label_country">국가(필수)</label>
            <input class="lhai-input" id="quoteCountry" type="text" required value="US" />
          </div>
          <div class="survey-field">
            <label class="lhai-label" for="quotePreferredLanguage" data-i18n="common.survey_recommendations.label_language">선호 언어(필수)</label>
            <select class="lhai-select" id="quotePreferredLanguage" required>
              <option value="ko" selected data-i18n="common.survey_recommendations.lang_ko">한국어</option>
              <option value="en" data-i18n="common.survey_recommendations.lang_en">영어</option>
              <option value="mix" data-i18n="common.survey_recommendations.lang_mix">혼합(한국어+영어)</option>
              <option value="other" data-i18n="common.survey_recommendations.lang_other">기타</option>
            </select>
          </div>
          <div class="survey-field survey-field--full">
            <label class="lhai-label" for="quoteCustomerNotes" data-i18n="common.survey_recommendations.label_notes">메모(선택)</label>
            <textarea class="lhai-textarea" id="quoteCustomerNotes" rows="3" data-i18n-placeholder="common.survey_recommendations.ph_notes" placeholder="추가로 알려주고 싶은 사항이 있나요?"></textarea>
          </div>
        </div>

        <div class="survey-recommendations__cta-row">
          <button type="submit" class="lhai-button lhai-button--primary" id="surveyRecSubmitBtn" data-i18n="common.survey_recommendations.btn_submit">견적 요청하기</button>
          <button type="button" class="lhai-button lhai-button--secondary" id="surveyRecBackBtn" data-i18n="common.survey_recommendations.btn_back">뒤로</button>
        </div>
        <p class="lhai-help" id="surveyRecQuoteFormStatus" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script type="module" src="../assets/js/pages/survey-recommendations.js"></script>
</body>
</html>
