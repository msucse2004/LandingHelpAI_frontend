<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>설문 분기 - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/survey-branching.css" />
</head>
<body>
  <main class="lhai-container lhai-container--survey">
    <section class="lhai-page-header">
      <div>
        <h1 class="lhai-title">필요를 진단하는 설문</h1>
        <p class="lhai-subtitle">앞서 선택한 필요에 따라 관련 질문만 보여드려요.</p>
      </div>
    </section>

    <section class="lhai-card lhai-card--center survey-branching__card" id="surveyBranchingCard">
      <div class="survey-branching__progress" aria-label="진행률">
        <div class="survey-branching__progress-bar" aria-hidden="true">
          <div class="survey-branching__progress-fill" id="surveyBranchingProgressFill"></div>
        </div>
        <div class="survey-branching__progress-meta" id="surveyBranchingProgressLabel" aria-live="polite">-</div>
      </div>

      <div id="surveyStepNeeds">
        <h2 class="survey-branching__step-title">1) 어떤 도움이 필요하세요?</h2>
        <p class="lhai-help">
          서비스 28개를 고르는 방식이 아니라, 필요한 “문제 영역”부터 빠르게 진단합니다.
        </p>

        <div class="survey-branching__needs-grid" role="group" aria-label="필요 영역 선택">
          <button type="button" class="survey-branching__need-card" data-need="arrival_setup" aria-pressed="false">
            <div class="survey-branching__need-card-title">미국 입국 준비가 필요해요</div>
            <p class="survey-branching__need-card-helper">입국 준비와 초기 절차를 우선순위로 정합니다.</p>
          </button>
          <button type="button" class="survey-branching__need-card" data-need="housing" aria-pressed="false">
            <div class="survey-branching__need-card-title">집 구하기가 필요해요</div>
            <p class="survey-branching__need-card-helper">기간/예산에 맞춰 필요한 진행 흐름을 좁혀요.</p>
          </button>
          <button type="button" class="survey-branching__need-card" data-need="mobility" aria-pressed="false">
            <div class="survey-branching__need-card-title">자동차가 필요해요</div>
            <p class="survey-branching__need-card-helper">렌트/구매와 예산에 맞춰 이동 계획을 준비합니다.</p>
          </button>
          <button type="button" class="survey-branching__need-card" data-need="family_school" aria-pressed="false">
            <div class="survey-branching__need-card-title">아이 학교 등록이 필요해요</div>
            <p class="survey-branching__need-card-helper">학년/학교 유형에 맞춰 서류·절차를 안내합니다.</p>
          </button>
          <button type="button" class="survey-branching__need-card" data-need="admin_business" aria-pressed="false">
            <div class="survey-branching__need-card-title">생활 행정/LLC 설립이 필요해요</div>
            <p class="survey-branching__need-card-helper">SSN/보험/LLC 필요 여부에 따라 진행 강도를 조정합니다.</p>
          </button>
        </div>

        <p class="lhai-help u-mt-3" id="surveyBranchingNeedsStatus">선택한 영역: 0개</p>
      </div>

      <div id="surveyStepQuestion" hidden>
        <div class="survey-branching__section-title" id="surveyBranchingSectionTitle">-</div>
        <h2 class="survey-branching__step-title" id="surveyBranchingQuestionLabel">-</h2>
        <p class="lhai-help u-mt-1" id="surveyBranchingQuestionHelp">-</p>

        <div class="survey-branching__input-wrap" id="surveyBranchingInputWrap"></div>
      </div>

      <div id="surveyStepReview" hidden>
        <h2 class="survey-branching__step-title">최종 확인</h2>
        <p class="lhai-help">
          답변을 한 번 더 확인한 뒤, 제출하면 추천 패키지/모듈/애드온을 보여드려요.
        </p>
        <div class="survey-branching__done-block" id="surveyBranchingReviewBlock"></div>
      </div>

      <div class="survey-branching__nav">
        <button type="button" class="lhai-button lhai-button--secondary" id="surveyBranchingBackBtn" disabled>뒤로</button>
        <button type="button" class="lhai-button lhai-button--primary" id="surveyBranchingNextBtn">다음</button>
      </div>

      <p class="lhai-help" id="surveyBranchingStatus" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="../assets/js/pages/survey-branching.js"></script>
</body>
</html>
