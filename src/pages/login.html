<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
</head>
<body>
  <main class="lhai-container">
    <section class="lhai-card lhai-card--center">
      <header class="lhai-page-header"><div><h1 class="lhai-title">로그인</h1><p class="lhai-subtitle">아이디와 비밀번호로 로그인합니다. (아이디 또는 이메일 모두 가능)</p></div></header>
      <form class="lhai-form" id="loginForm">
        <label class="lhai-label" for="loginId">아이디</label>
        <input class="lhai-input" id="loginId" name="loginId" type="text" autocomplete="username" required placeholder="예: democustomer 또는 이메일" />
        <label class="lhai-label" for="password">비밀번호</label>
        <input class="lhai-input" id="password" name="password" type="password" autocomplete="current-password" required />
        <button class="lhai-button lhai-button--primary" type="submit">로그인</button>
      </form>
      <p class="lhai-help" id="loginStatus">이메일 인증이 완료된 계정만 로그인할 수 있습니다.</p>
      <p class="u-mt-2">
        <a href="signup.html">회원가입</a>
        ·
        <a href="verify-email.html">이메일 인증</a>
      </p>
    </section>
  </main>
  <script type="module" src="../assets/js/pages/login.js"></script>
</body>
</html>
