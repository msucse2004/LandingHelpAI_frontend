<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문서 - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/documents.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial customer-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header">
        <div>
          <h1 class="lhai-title" id="documentsPageTitle" data-i18n="customer.documents.page_title">문서 센터</h1>
          <p class="lhai-subtitle" id="documentsPageSubtitle" data-i18n="customer.documents.page_subtitle">
            파일을 올리고 검토 상태를 확인하며 발급 문서에 접근합니다.
          </p>
        </div>
      </section>

      <section class="lhai-card" id="documentsPrePaymentGate" hidden>
        <h2 class="lhai-card__title" id="documentsGateTitle" data-i18n="customer.documents.gate.title">결제 완료 후 이용 가능</h2>
        <p class="lhai-help u-mt-2" id="documentsGateBody" data-i18n="customer.documents.gate.body"></p>
      </section>

      <div id="documentsGatedContent" hidden>
      <section class="lhai-card lhai-required-docs-section" id="customerRequiredDocsSection" hidden>
        <h2 class="lhai-card__title" data-i18n="customer.documents.required.section_title">필수 서류 (서비스 준비)</h2>
        <p class="lhai-help u-mt-1" data-i18n="customer.documents.required.section_lead"></p>
        <p class="lhai-help u-mt-2" id="customerRequiredDocsStatus" aria-live="polite"></p>
        <div class="lhai-required-docs-list u-mt-2" id="customerRequiredDocsList"></div>
        <p class="lhai-help u-mt-3">
          <a class="lhai-required-docs-msglink" href="../pages/messages.html" data-i18n="customer.documents.required.link_messages"
            >메시지함에서 안내 확인</a>
        </p>
      </section>

      <section class="lhai-card lhai-doc-center">
        <h2 class="lhai-card__title">문서 업로드</h2>
        <form class="lhai-form" id="documentUploadForm">
          <label class="lhai-label" for="uploadName">파일 이름</label>
          <input class="lhai-input" id="uploadName" name="uploadName" type="text" placeholder="예: example.pdf" required />
          <label class="lhai-label" for="uploadType">구분</label>
          <select class="lhai-select" id="uploadType" name="uploadType">
            <option value="documents_submitted">제출 문서</option>
            <option value="consent_documents">동의서</option>
            <option value="power_of_attorney">위임장</option>
            <option value="completion_documents">완료 관련 문서</option>
          </select>
          <button class="lhai-button lhai-button--primary" type="submit">업로드 (스텁)</button>
        </form>
        <p class="lhai-help" id="documentUploadStatus">아직 업로드한 파일이 없습니다.</p>
      </section>

      <section class="lhai-doc-grid" id="documentSections">
        <article class="lhai-card"><h2 class="lhai-card__title">수신 문서</h2><div id="sectionDocumentsReceived"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">제출 문서</h2><div id="sectionDocumentsSubmitted"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">생성·발급 문서</h2><div id="sectionGeneratedDocuments"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">동의서</h2><div id="sectionConsentDocuments"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">위임장</h2><div id="sectionPowerOfAttorney"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">완료 관련 문서</h2><div id="sectionCompletionDocuments"></div></article>
      </section>
      </div>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/documents.js"></script>
</body>
</html>
