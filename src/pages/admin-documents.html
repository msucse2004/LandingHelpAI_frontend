<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Documents - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-documents.css" />
</head>
<body>
  <header class="lhai-topbar">
    <div class="lhai-brand">Landing Help AI Admin</div>
    <div class="lhai-topbar__right">
      <a class="lhai-topbar-mail" href="messages.html" title="메시지함" aria-label="메시지함">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      </a>
      <div class="lhai-user-menu" data-lhai-admin-menu>
        <button type="button" class="lhai-user-menu__trigger" aria-expanded="false" aria-haspopup="menu">
          <span class="lhai-badge lhai-badge--admin">Admin</span>
          <span class="lhai-user-menu__chevron" aria-hidden="true">▾</span>
        </button>
        <div class="lhai-user-menu__panel" role="menu" hidden>
          <a class="lhai-user-menu__item" role="menuitem" href="admin-profile.html">내 정보</a>
          <a class="lhai-user-menu__item" role="menuitem" href="admin-password.html">비밀번호 수정</a>
          <button type="button" class="lhai-user-menu__item lhai-user-menu__item--button" role="menuitem" data-lhai-logout>로그아웃</button>
        </div>
      </div>
    </div>
  </header>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header"><div><h1 class="lhai-title">Documents</h1><p class="lhai-subtitle">Review and verify submitted files.</p></div></section>
      <section class="lhai-admin-doc-grid">
        <article class="lhai-card lhai-admin-doc-list">
          <h2 class="lhai-card__title">Review Queue</h2>
          <div id="adminDocumentList"></div>
        </article>
        <article class="lhai-card">
          <h2 class="lhai-card__title">Review Actions</h2>
          <form class="lhai-form" id="adminDocumentReviewForm">
            <label class="lhai-label" for="adminDocStatus">Document Status</label>
            <select class="lhai-select" id="adminDocStatus">
              <option value="UNDER_REVIEW">UNDER_REVIEW</option>
              <option value="APPROVED">APPROVED</option>
              <option value="REJECTED">REJECTED</option>
              <option value="UPLOADED">UPLOADED</option>
            </select>
            <label class="lhai-label" for="adminReviewStatus">Review Status Label</label>
            <input class="lhai-input" id="adminReviewStatus" type="text" value="under_review" />
            <button class="lhai-button lhai-button--primary" type="submit">Update Status Stub</button>
          </form>

          <h3 class="lhai-card__title u-mt-4">Request New Document (Stub)</h3>
          <form class="lhai-form" id="adminDocumentRequestForm">
            <label class="lhai-label" for="adminRequestType">Request Type</label>
            <select class="lhai-select" id="adminRequestType">
              <option value="consent_documents">Consent Documents</option>
              <option value="power_of_attorney">Power of Attorney</option>
              <option value="completion_documents">Completion Documents</option>
              <option value="documents_submitted">General Submission</option>
            </select>
            <label class="lhai-label" for="adminRequestName">Document Name</label>
            <input class="lhai-input" id="adminRequestName" type="text" placeholder="consent_form.pdf" required />
            <button class="lhai-button lhai-button--secondary" type="submit">Create Request Stub</button>
          </form>
          <p class="lhai-help" id="adminDocumentStatusMessage">Select a document to review.</p>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-documents.js"></script>
</body>
</html>
