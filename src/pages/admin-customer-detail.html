<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Customer Detail - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-customer-detail.css" />
</head>
<body>
    <div id="lhai-app-header-root"></div>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header"><div><h1 class="lhai-title">Customer Detail</h1><p class="lhai-subtitle">Two-column detail pattern for operations.</p></div></section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card"><h2 class="lhai-card__title">Overview</h2><div id="adminOpsOverview"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">Quote Status</h2><div id="adminOpsQuoteStatus"></div></article>
      </section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card"><h2 class="lhai-card__title">Invoice/Payment Status</h2><div id="adminOpsInvoicePayment"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">Document Status</h2><div id="adminOpsDocumentStatus"></div></article>
      </section>
      <section class="lhai-card">
        <h2 class="lhai-card__title">Communication History (In-app + Email)</h2>
        <div class="lhai-admin-comm-grid">
          <article>
            <h3 class="u-mb-2">In-app Messages</h3>
            <div id="adminCustomerMessages"></div>
          </article>
          <article>
            <h3 class="u-mb-2">Email Logs</h3>
            <div id="adminCustomerEmailLogs"></div>
          </article>
        </div>
      </section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card"><h2 class="lhai-card__title">Schedule Status</h2><div id="adminOpsScheduleStatus"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">Recent Messages</h2><div id="adminOpsRecentMessages"></div></article>
      </section>
      <section class="lhai-grid lhai-grid--2">
        <article class="lhai-card"><h2 class="lhai-card__title">AI Escalation History (Stub)</h2><div id="adminOpsAiEscalation"></div></article>
        <article class="lhai-card"><h2 class="lhai-card__title">Audit History (Stub)</h2><div id="adminOpsAuditHistory"></div></article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/app-header.js"></script>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-customer-detail.js"></script>
</body>
</html>
