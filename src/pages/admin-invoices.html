<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Invoices - Landing Help AI</title>
  <link rel="stylesheet" href="../assets/css/reset.css" /><link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" /><link rel="stylesheet" href="../assets/css/components.css" /><link rel="stylesheet" href="../assets/css/utilities.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-invoices.css" />
</head>
<body>
  <header class="lhai-topbar">
    <div class="lhai-brand">Landing Help AI Admin</div>
    <div class="lhai-topbar__right">
      <a class="lhai-topbar-mail" href="messages.html" title="메시지함" aria-label="메시지함">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      </a>
      <div class="lhai-user-menu" data-lhai-admin-menu>
        <button type="button" class="lhai-user-menu__trigger" aria-expanded="false" aria-haspopup="menu">
          <span class="lhai-badge lhai-badge--admin">Admin</span>
          <span class="lhai-user-menu__chevron" aria-hidden="true">▾</span>
        </button>
        <div class="lhai-user-menu__panel" role="menu" hidden>
          <a class="lhai-user-menu__item" role="menuitem" href="admin-profile.html">내 정보</a>
          <a class="lhai-user-menu__item" role="menuitem" href="admin-password.html">비밀번호 수정</a>
          <button type="button" class="lhai-user-menu__item lhai-user-menu__item--button" role="menuitem" data-lhai-logout>로그아웃</button>
        </div>
      </div>
    </div>
  </header>
  <div class="lhai-layout">
    <aside class="lhai-sidebar" id="sidebar"><!-- TODO: load partial admin-sidebar.html --></aside>
    <main class="lhai-main">
      <section class="lhai-page-header"><div><h1 class="lhai-title">Invoices</h1><p class="lhai-subtitle">Invoice monitoring and collection status.</p></div></section>
      <section class="lhai-invoice-layout">
        <article class="lhai-card lhai-invoice-list">
          <h2 class="lhai-card__title">Invoices</h2>
          <div id="adminInvoiceList"></div>
        </article>
        <article class="lhai-card">
          <h2 class="lhai-card__title">Create / Edit Invoice</h2>
          <form class="lhai-form" id="adminInvoiceForm">
            <label class="lhai-label" for="approvedQuoteId">Approved Quote ID</label>
            <input class="lhai-input" id="approvedQuoteId" name="approvedQuoteId" type="text" placeholder="q-demo-1" />
            <label class="lhai-label" for="invoiceDueDate">Due date</label>
            <input class="lhai-input" id="invoiceDueDate" name="invoiceDueDate" type="date" />
            <label class="lhai-label" for="invoiceInPersonOnly">In-person only</label>
            <select class="lhai-select" id="invoiceInPersonOnly" name="invoiceInPersonOnly">
              <option value="false">No</option>
              <option value="true">Yes</option>
            </select>
            <label class="lhai-label" for="invoiceDraftNotes">Draft notes (L3+ in-person-only edit stub)</label>
            <textarea class="lhai-textarea" id="invoiceDraftNotes" name="invoiceDraftNotes" rows="4"></textarea>
            <div class="u-flex u-gap-2">
              <button class="lhai-button lhai-button--primary" type="button" id="createInvoiceBtn">Create from Approved Quote</button>
              <button class="lhai-button lhai-button--secondary" type="button" id="saveDraftBtn">Save Draft Stub</button>
            </div>
          </form>
          <p class="lhai-help" id="adminInvoiceStatus">Select an invoice or create from approved quote.</p>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="../assets/js/core/logout-button.js"></script>
  <script type="module" src="../assets/js/core/admin-user-menu.js"></script>
  <script type="module" src="../assets/js/pages/admin-invoices.js"></script>
</body>
</html>
